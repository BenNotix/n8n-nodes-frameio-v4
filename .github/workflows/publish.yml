# Publishes the package to npm with a provenance statement.
# From May 1st 2026, all n8n community nodes must be published via
# GitHub Actions with npm provenance. Prefer configuring npm OIDC
# Trusted Publishing for this repository; NPM_TOKEN is the fallback.
name: Publish

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
